tree:
  - id: N01
    type: question
    support_level: explicit
    source_refs: ["§1", "§3"]
    title: Why do deeper plain CNNs degrade as depth increases?
    description: Investigate why increasing depth in a plain architecture worsens optimization and validation behavior.
    children:
      - id: N02
        type: experiment
        support_level: explicit
        title: Compare 18-layer and 34-layer plain networks
        source_refs: ["Table 2", "Section 4.1"]
        result: The 34-layer plain model validates worse than the 18-layer plain model in the matched comparison reported by the paper.
        evidence: [C02, "Table 2"]

      - id: N03
        type: experiment
        support_level: explicit
        source_refs: ["§4.1", "Table 2", "Figure 4 left"]
        title: Plain-34 exhibits degradation compared to plain-18
        result: The 34-layer plain network has higher training and validation error than the 18-layer model (28.54% vs 27.94% top-1), confirming the degradation problem is an optimization difficulty, not overfitting.
        evidence: [C02, "Table 2", "Figure 4"]

      - id: N04
        type: experiment
        support_level: explicit
        source_refs: ["§3", "§3.1"]
        title: Propose residual reformulation F(x) = H(x) - x
        result: The paper introduces shortcut connections so stacked layers learn residual functions F(x) rather than unreferenced mappings H(x).
        evidence: [C01]
        children:
          - id: N05
            type: experiment
            support_level: explicit
            title: Compare 34-layer plain and 34-layer residual networks
            source_refs: ["Table 2", "Section 4.1"]
            result: The 34-layer residual model lowers top-1 validation error relative to the 34-layer plain model.
            evidence: [C01, "Table 2"]
            children:
              - id: N06
                type: decision
                support_level: explicit
                source_refs: ["§4.1", "Table 3"]
                framing_basis: >
                  "So we do not use option C in the rest of this paper,
                  to reduce memory/time complexity and model sizes."
                title: Choose shortcut option B for deeper models
                choice: Use projection shortcuts only when dimensions change, identity shortcuts elsewhere.
                alternatives:
                  - "Option A: identity with zero-padding"
                  - "Option C: all projections"
                evidence: Table 3 shows all three options outperform plain-34; differences among A/B/C are small.
                children:
                  - id: N07
                    type: experiment
                    support_level: explicit
                    title: Compare shortcut options A, B, and C
                    source_refs: ["Table 3", "Section 4.1"]
                    result: All three shortcut variants improve over plain-34; option B is slightly better than A and option C is only marginally better than B.
                    evidence: [C04, "Table 3", "Section 4.2"]
          - id: N08
            type: experiment
            support_level: explicit
            title: Scale the residual family to 50, 101, and 152 layers
            also_depends_on: [N06]
            source_refs: ["Table 3", "Section 4.1"]
            result: Residual models continue to improve top-1 and top-5 ImageNet error as depth increases.
            evidence: [C03, "Table 3"]

      - id: N09
        type: experiment
        support_level: explicit
        source_refs: ["§4.2", "Table 6"]
        title: 1202-layer ResNet on CIFAR-10 shows no accuracy gain over 110-layer
        result: The 1202-layer model achieves similar training error to the 110-layer model but has higher test error (7.93% vs 6.43%), suggesting overfitting on the small dataset.
        evidence: ["Table 6"]
