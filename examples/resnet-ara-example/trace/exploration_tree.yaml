tree:
  - id: N01
    type: question
    support_level: explicit
    source_refs: ["§1", "§3"]
    title: Why do deeper plain CNNs degrade as depth increases?
    description: Investigate why increasing depth in a plain architecture worsens optimization and validation behavior.
    children:
      - id: N02
        type: experiment
        support_level: explicit
        title: Compare 18-layer and 34-layer plain networks
        source_refs: ["Table 2", "Section 4.1"]
        result: The 34-layer plain model validates worse than the 18-layer plain model in the matched comparison reported by the paper.
        evidence: [C02, "Table 2"]
        children:
          - id: N03
            type: dead_end
            support_level: explicit
            source_refs: ["Table 2", "§4.1"]
            title: Keep stacking plain layers without shortcuts
            hypothesis: A deeper plain network should at least match the shallower solution space and therefore should not optimize worse.
            failure_mode: The deeper plain network trains and validates worse, revealing degradation.
            lesson: Depth alone is not enough; the formulation of the mapping matters.
      - id: N04
        type: decision
        support_level: explicit
        source_refs: ["§3", "§3.1"]
        title: Reformulate the target mapping as a residual function
        choice: Replace plain stacked mappings with residual blocks that add a shortcut path to the learned residual branch.
        alternatives:
          - Keep the plain stack and rely on initialization plus normalization alone
          - Increase depth further without shortcuts
        evidence: Plain-depth degradation motivates changing the mapping rather than merely adding layers.
        children:
          - id: N05
            type: experiment
            support_level: explicit
            title: Compare 34-layer plain and 34-layer residual networks
            source_refs: ["Table 2", "Section 4.1"]
            result: The 34-layer residual model lowers top-1 validation error relative to the 34-layer plain model.
            evidence: [C01, "Table 2"]
            children:
              - id: N06
                type: decision
                support_level: explicit
                source_refs: ["§3.2", "Table 3"]
                title: Use identity shortcuts by default
                choice: Use identity shortcuts when dimensions match and adapt shortcuts only when dimensions increase.
                alternatives:
                  - Projection on every shortcut
                  - No shortcut path
                evidence: Residual gains appear even before projecting every shortcut.
                children:
                  - id: N07
                    type: experiment
                    support_level: explicit
                    title: Compare shortcut options A, B, and C
                    source_refs: ["Table 3", "Section 4.1"]
                    result: All three shortcut variants improve over plain-34; option B is slightly better than A and option C is only marginally better than B.
                    evidence: [C04, "Table 3", "Section 4.2"]
          - id: N09
            type: experiment
            support_level: explicit
            title: Scale the residual family to 50, 101, and 152 layers
            also_depends_on: [N06]
            source_refs: ["Table 3", "Section 4.1"]
            result: Residual models continue to improve top-1 and top-5 ImageNet error as depth increases.
            evidence: [C03, "Table 3"]
