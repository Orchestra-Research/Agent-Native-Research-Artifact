dataset:
  name: imagenet-2012
  classes: 1000
  train_images: 1280000
  val_images: 50000

model:
  family: resnet
  variant: resnet-34
  shortcut_policy:
    same_dimensions: identity
    increased_dimensions:
      option_a: zero_padding
      option_b: projection_1x1

training:
  optimizer: sgd
  batch_size: 256
  learning_rate:
    initial: 0.1
    schedule: divide by 10 when error plateaus
  max_iterations: 600000
  momentum: 0.9
  weight_decay: 0.0001
  dropout: false

augmentation:
  resize_shorter_side: [256, 480]
  random_crop: [224, 224]
  horizontal_flip: true
  mean_subtraction: per_pixel
  color_augmentation: standard

evaluation:
  validation_metric:
    - top1_error
    - top5_error
  comparison_testing: 10_crop
  best_results_testing:
    fully_convolutional: true
    multi_scale_shorter_side: [224, 256, 384, 480, 640]

